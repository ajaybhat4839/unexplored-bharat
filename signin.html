<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Unexplored Bharat</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #1a0a00, #2d1500, #4a2000);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 153, 51, 0.3);
            border-radius: 20px;
            padding: 50px 40px;
            width: 420px;
            text-align: center;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
            background: linear-gradient(45deg, #FF9933, #FFFFFF, #138808);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #f0c27b;
            font-size: 14px;
            margin-bottom: 35px;
            font-style: italic;
        }

        .tab-container {
            display: flex;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            margin-bottom: 25px;
            padding: 4px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
            color: #aaa;
            border: none;
            background: transparent;
        }

        .tab.active {
            background: linear-gradient(45deg, #FF9933, #ff6f00);
            color: white;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-size: 14px;
            font-weight: bold;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid rgba(255, 153, 51, 0.3);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }

        .input-group input:focus {
            border-color: #FF9933;
        }

        .input-group input::placeholder {
            color: #777;
        }

        .main-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #FF9933, #ff6f00);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .main-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(255, 153, 51, 0.5);
        }

        .main-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #777;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
        }

        .divider span {
            padding: 0 15px;
            font-size: 13px;
        }

        .social-btn {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            background: transparent;
            color: white;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .hidden {
            display: none;
        }

        .message {
            font-size: 14px;
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
        }

        .success-msg {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }

        .error-msg {
            background: rgba(255, 82, 82, 0.2);
            color: #ff5252;
        }

        .flag-strip {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 2px;
        }

        .flag-strip div {
            width: 60px;
            height: 4px;
            border-radius: 2px;
        }

        .saffron { background: #FF9933; }
        .white { background: #FFFFFF; }
        .green { background: #138808; }

        .back-link {
            color: #f0c27b;
            text-decoration: none;
            font-size: 13px;
            margin-top: 20px;
            display: inline-block;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">Unexplored Bharat</div>
        <p class="subtitle">Discover India's Hidden Soul</p>

        <!-- Tab Switcher -->
        <div class="tab-container">
            <button class="tab active" id="signInTab" onclick="switchTab('signin')">Sign In</button>
            <button class="tab" id="signUpTab" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <!-- SIGN IN FORM -->
        <form id="signinForm">
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="signinEmail" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="signinPassword" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="main-btn" id="signinBtn">Sign In →</button>
            <p class="message hidden" id="signinMessage"></p>
        </form>

        <!-- SIGN UP FORM -->
        <form id="signupForm" class="hidden">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="signupName" placeholder="Enter your full name" required>
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="signupEmail" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="signupPassword" placeholder="Min. 8 characters" required>
            </div>
            <button type="submit" class="main-btn" id="signupBtn">Create Account →</button>
            <p class="message hidden" id="signupMessage"></p>
        </form>

        <!-- Divider -->
        <div class="divider"><span>or continue with</span></div>

        <!-- Google Sign In -->
        <button class="social-btn" onclick="signInWithGoogle()">
            🔵 Continue with Google
        </button>

        <!-- Flag -->
        <div class="flag-strip">
            <div class="saffron"></div>
            <div class="white"></div>
            <div class="green"></div>
        </div>

        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

    <script>
        // ============================================
        // FIREBASE CONFIG - YOUR REAL CONFIG!
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyB27SEZl6L2aDr0TCI8MIxzNjJ-45n9W6M",
            authDomain: "unexploredbharat-9e939.firebaseapp.com",
            projectId: "unexploredbharat-9e939",
            storageBucket: "unexploredbharat-9e939.firebasestorage.app",
            messagingSenderId: "589150204251",
            appId: "1:589150204251:web:8e15203c5b3f4bc76e6a7e",
            measurementId: "G-D9WGE2250T"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // ============================================
        // TAB SWITCHING
        // ============================================
        function switchTab(tab) {
            const signinTab = document.getElementById('signInTab');
            const signupTab = document.getElementById('signUpTab');
            const signinForm = document.getElementById('signinForm');
            const signupForm = document.getElementById('signupForm');

            if (tab === 'signin') {
                signinTab.classList.add('active');
                signupTab.classList.remove('active');
                signinForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
            } else {
                signupTab.classList.add('active');
                signinTab.classList.remove('active');
                signupForm.classList.remove('hidden');
                signinForm.classList.add('hidden');
            }
        }

        // ============================================
        // SHOW MESSAGE
        // ============================================
        function showMessage(elementId, message, isError = false) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.className = 'message ' + (isError ? 'error-msg' : 'success-msg');
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 5000);
        }

        // ============================================
        // SIGN IN WITH EMAIL & PASSWORD (REAL FIREBASE)
        // ============================================
        document.getElementById('signinForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('signinEmail').value.trim();
            const password = document.getElementById('signinPassword').value;
            const btn = document.getElementById('signinBtn');
            
            btn.innerHTML = '<span class="loading-spinner"></span> Signing in...';
            btn.disabled = true;

            try {
                await auth.signInWithEmailAndPassword(email, password);
                showMessage('signinMessage', '✅ Welcome back! Redirecting...');
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
                
            } catch (error) {
                let message = 'Something went wrong.';
                if (error.code === 'auth/user-not-found') message = '❌ No account found. Sign up first.';
                if (error.code === 'auth/wrong-password') message = '❌ Incorrect password.';
                if (error.code === 'auth/invalid-email') message = '❌ Please enter a valid email.';
                if (error.code === 'auth/invalid-credential') message = '❌ Invalid email or password.';
                showMessage('signinMessage', message, true);
            }
            
            btn.innerHTML = 'Sign In →';
            btn.disabled = false;
        });

        // ============================================
        // SIGN UP WITH EMAIL & PASSWORD (REAL FIREBASE)
        // ============================================
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const btn = document.getElementById('signupBtn');
            
            if (password.length < 8) {
                showMessage('signupMessage', '❌ Password must be at least 8 characters.', true);
                return;
            }

            btn.innerHTML = '<span class="loading-spinner"></span> Creating account...';
            btn.disabled = true;

            try {
                const result = await auth.createUserWithEmailAndPassword(email, password);
                await result.user.updateProfile({ displayName: name });
                
                showMessage('signupMessage', '✅ Account created! Welcome, ' + name + '! 🇮🇳');
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
                
            } catch (error) {
                let message = 'Something went wrong.';
                if (error.code === 'auth/email-already-in-use') message = '❌ Email already registered. Sign in instead.';
                if (error.code === 'auth/weak-password') message = '❌ Password too weak. Use at least 6 characters.';
                if (error.code === 'auth/invalid-email') message = '❌ Please enter a valid email.';
                showMessage('signupMessage', message, true);
            }
            
            btn.innerHTML = 'Create Account →';
            btn.disabled = false;
        });

        // ============================================
        // SIGN IN WITH GOOGLE (REAL FIREBASE)
        // ============================================
        async function signInWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            
            try {
                await auth.signInWithPopup(provider);
                window.location.href = 'dashboard.html';
            } catch (error) {
                showMessage('signinMessage', '❌ Google sign in failed. Try email instead.', true);
            }
        }

        // ============================================
        // AUTO-REDIRECT IF ALREADY LOGGED IN
        // ============================================
        auth.onAuthStateChanged((user) => {
            if (user && window.location.pathname.includes('signin.html')) {
                // Already logged in, go to dashboard
                // Uncomment if you want auto-redirect:
                // window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
