<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unexplored Bharat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #1a0a00, #2d1500, #4a2000);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }
        
        .container {
            padding: 40px;
        }
        
        .logo-text {
            font-size: 70px;
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #FF9933, #FFFFFF, #138808);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }
        
        .tagline {
            font-size: 22px;
            color: #f0c27b;
            margin-bottom: 50px;
            font-style: italic;
        }
        
        .coming-soon {
            font-size: 28px;
            color: #ffcc80;
            margin-bottom: 40px;
            letter-spacing: 8px;
            text-transform: uppercase;
        }
        
        .email-box {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .email-box input {
            padding: 16px 20px;
            width: 350px;
            border: 2px solid #f0c27b;
            border-radius: 30px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
            outline: none;
        }
        
        .email-box input::placeholder {
            color: #ccc;
        }
        
        .email-box button {
            padding: 16px 30px;
            background: linear-gradient(45deg, #FF9933, #ff6f00);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
        }
        
        .email-box button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,153,51,0.5);
        }
        
        .small-text {
            color: #aaa;
            font-size: 14px;
        }
        
        .flag-strip {
            margin-top: 50px;
            display: flex;
            justify-content: center;
            gap: 2px;
        }
        
        .flag-strip div {
            width: 80px;
            height: 5px;
            border-radius: 3px;
        }
        
        .saffron { background: #FF9933; }
        .white { background: #FFFFFF; }
        .green { background: #138808; }
   .signin-link {
    color: #f0c27b;
    text-decoration: none;
    font-size: 15px;
    display: block;
    margin-top: 12px;
    transition: color 0.3s;
}
.signin-link:hover {
    color: #FF9933;
}
   </style>
</head>
<body>
    <div class="container">
        <h1 class="logo-text">Unexplored Bharat</h1>
        <p class="tagline">Beyond the Map. Into the Soul of India.</p>
        
        <p class="coming-soon">✨ Coming Soon ✨</p>
        
        <div class="email-box">
            <input type="email" placeholder="Enter your email for early access">
            <button>Notify Me</button>
        </div>
        <a href="signin.html" style="color: #f0c27b; text-decoration: none; font-size: 14px; display: block; margin-top: 15px;">
    Already a member? Sign In →
</a>
        
        <p class="small-text">Be the first to explore India's hidden gems. 🌏</p>
        <a href="signin.html" class="signin-link">Already a member? Sign In →</a>
        
        <div class="flag-strip">
            <div class="saffron"></div>
            <div class="white"></div>
            <div class="green"></div>
        </div>
    </div>
</body>
</html>
